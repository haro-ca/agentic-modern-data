<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.1.0"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-d5184c3a46d96f1a39bf35285d2bd30c"}, "mark": {"type": "bar"}, "encoding": {"tooltip": [{"field": "product", "type": "nominal"}, {"field": "revenue", "type": "quantitative"}, {"field": "transactions", "type": "quantitative"}], "x": {"field": "revenue", "title": "Revenue", "type": "quantitative"}, "y": {"field": "product", "sort": "-x", "title": "Product", "type": "nominal"}}, "height": 300, "title": "Top 10 Products by Revenue", "width": 600, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-d5184c3a46d96f1a39bf35285d2bd30c": [{"product": "Golden Gate Ginger", "revenue": 11595, "transactions": 586}, {"product": "Outback Oatmeal", "revenue": 11199, "transactions": 561}, {"product": "Austin Almond Biscotti", "revenue": 11148, "transactions": 530}, {"product": "Tokyo Tidbits", "revenue": 10986, "transactions": 583}, {"product": "Pearly Pies", "revenue": 10785, "transactions": 550}, {"product": "Orchard Oasis", "revenue": 10758, "transactions": 523}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
